name: Deploy to R2

on:
  push:
    branches: [main]
    paths:
      - prompt-engineering-eval.html
      - prompt-engineering-tweets.html
      - prompt-engineering-game.html

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: |
            r2 object put docs/prompt-engineering-eval.html --file=prompt-engineering-eval.html --content-type text/html
            r2 object put docs/prompt-engineering-tweets.html --file=prompt-engineering-tweets.html --content-type text/html
            r2 object put docs/prompt-engineering-game.html --file=prompt-engineering-game.html --content-type text/html
